# HornCAD rectangular test project.
#
# This file is not a frozen public API. It is a concrete configuration sketch for
# validating the major concepts before implementation.

units:
  length: mm
  angle: degrees

throat:
  diameter: 25.4
  angle: 10.0                 # Full included angle. Valid range: 0..90.
  conic_extension:
    length: 12.0              # Starts at throat radius r0.
    exit_angle: 14.0          # Full included angle. Defaults to throat.angle.

mouth:
  width: 380.0
  height: 235.0
  shape:
    type: rectangle           # ellipse | rounded_rectangle | rectangle
    shape_power: 6.0          # Ignored by exact rectangle when corner_radius is numeric.
    corner_radius: 4.0        # Exact 4 mm corner radius.
  curvature:
    type: cylinder            # flat | cylinder | sphere
    sag: 30.0                 # Authored curvature depth. Not local curvature setback everywhere.
    radius: null

length:
  max: 150.0                  # Centerline depth before mouth curvature setback.

profiles:
  horizontal:
    coverage: 50.0            # Full included coverage angle.
    k: 1.0                    # Valid range: 0..10.
    s_initial: null           # Usually solved per radial direction.
  vertical:
    coverage: 31.0
    k: 1.0
    s_initial: null

osse:
  solve: s                    # M1 solves S for boundary fit; M2 solves S(p).
  s_bounds: [0.0, 4.0]
  q: 0.995                    # Valid range: 0.99..1.00.
  n: 3.0                      # Valid range: 2..10.

morph:
  start: 0.0                  # Physical z distance where morph begins.
  rate: 2.0                   # Morph rate / transition aggressiveness.
  area_target: equivalent_round_mouth # Used for downstream area-expansion checks.

refinement:
  solve: [morph_rate, n, q]    # M3 searches these while keeping K fixed.
  morph_rate_bounds: [0.25, 8.0]
  n_bounds: [2.0, 10.0]
  q_bounds: [0.99, 1.0]
  area_rms_log_tolerance: 0.05
  smoothness_weight: 2.0      # Penalizes abrupt area-curve derivative changes.
  max_log_area_slope_change: 0.01
  s_span_weight: 0.2          # Penalizes S spread beyond design-scaled expectation.
  s_smoothness_weight: 0.2    # Penalizes abrupt S changes over p.
  max_profile_slope_change: 2.0
  profile_smoothness_weight: 0.5

resolution:
  angular_segments: 96        # Adaptive around p; denser where boundary curvature changes.
  length_segments: 100        # Adaptive along z; denser where profile curvature changes.

validation:
  reject_if:
    - conic_extension_length_gte_local_profile_length
    - solved_s_outside_bounds
    - mouth_curvature_radius_too_small
  warn_if:
    - outside_surface_self_intersects
    - area_error_exceeds_tolerance

outputs:
  scope: full                  # quarter | half | full output scope.
  design_review:
    plots:
      hv_profiles: true
    report: true
    resolved_config: true
  cad:
    wall_thickness: 0.0       # 0.0 outputs faces only, not a closed 3D asset.
    formats:
      2d:
        profiles: true
        slices: true
      3d:
        stl: false
